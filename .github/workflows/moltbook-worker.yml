name: moltbook-worker

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      submolt_action:
        description: 'Which submolt body to post'
        required: true
        type: choice
        options:
          - post_a
          - post_b

concurrency:
  group: moltbook-worker
  cancel-in-progress: false

jobs:
  heartbeat:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: ping /api/v1/home
        env:
          AISS_MOLTBOOK_API_KEY: ${{ secrets.AISS_MOLTBOOK_API_KEY }}
        run: |
          set -u
          if [ -z "${AISS_MOLTBOOK_API_KEY:-}" ]; then
            echo "secret missing; skipping heartbeat"
            exit 0
          fi
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            --max-time 20 \
            -H "Authorization: Bearer ${AISS_MOLTBOOK_API_KEY}" \
            'https://www.moltbook.com/api/v1/home' || echo "000")
          echo "heartbeat http_code=${code}"
          exit 0

  post:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: post submolt
        env:
          AISS_MOLTBOOK_API_KEY: ${{ secrets.AISS_MOLTBOOK_API_KEY }}
          ACTION: ${{ inputs.submolt_action }}
        run: |
          set -euo pipefail
          if [ -z "${AISS_MOLTBOOK_API_KEY:-}" ]; then
            echo "::error::AISS_MOLTBOOK_API_KEY secret is not set"
            exit 1
          fi
          case "${ACTION}" in
            post_a) src="integrations/moltbook/submolt-a.md" ;;
            post_b) src="integrations/moltbook/submolt-b.md" ;;
            *) echo "::error::unknown submolt_action: ${ACTION}"; exit 1 ;;
          esac
          if [ ! -f "${src}" ]; then
            echo "::error::missing body file: ${src}"
            exit 1
          fi

          python3 - "$src" <<'PY' > payload.json
          import json, sys, re, pathlib
          raw = pathlib.Path(sys.argv[1]).read_text()
          m = re.match(r'^---\n(.*?)\n---\n(.*)$', raw, re.DOTALL)
          if not m:
              sys.exit("frontmatter missing")
          meta = {}
          for line in m.group(1).splitlines():
              if ':' not in line: continue
              k, v = line.split(':', 1)
              meta[k.strip()] = v.strip()
          body = m.group(2).lstrip('\n').rstrip() + '\n'
          required = ('submolt_name', 'title', 'type')
          missing = [k for k in required if k not in meta]
          if missing:
              sys.exit(f"frontmatter missing keys: {missing}")
          json.dump({
              "submolt_name": meta["submolt_name"],
              "title": meta["title"],
              "type": meta["type"],
              "content": body,
          }, sys.stdout)
          PY

          http_code=$(curl -sS -o response.json -w '%{http_code}' \
            --max-time 30 \
            -X POST \
            -H "Authorization: Bearer ${AISS_MOLTBOOK_API_KEY}" \
            -H "Content-Type: application/json" \
            --data @payload.json \
            'https://www.moltbook.com/api/v1/posts')
          echo "post http_code=${http_code}"

          jq 'del(.verification.verification_code) | del(.verification_code)' response.json 2>/dev/null || cat response.json

          if [ "${http_code}" != "200" ] && [ "${http_code}" != "201" ]; then
            if [ "${http_code}" = "202" ] && jq -e '.verification_required == true' response.json >/dev/null 2>&1; then
              echo "::warning::verification challenge returned; solve via /api/v1/verify out-of-band"
              exit 0
            fi
            echo "::error::post failed (http ${http_code})"
            exit 1
          fi
